# Auto-build the parent-host container image on push to main and push
# it to ECR (us-west-2). Mirrors deploy-enclave-aws.yml but for the
# parent FastAPI app at parent/Dockerfile.parent.
#
# What the parent does on the EC2 host (NOT inside the enclave):
#   - Runs FastAPI on :8443 for /health, /admin/usage, /trust
#   - Runs the TCP pump on :8444 (QUILL_TCP_PUMP=true) — accepts raw
#     TCP from the NLB and forwards bytes 1:1 to the enclave's vsock
#     listener (CID 16, port 8001). No prompt inspection on the parent.
#   - Runs the bootstrap RPC server on vsock 9000 (QUILL_BOOTSTRAP_SERVER=true)
#     — serves device keys + provider URL config to the enclave at boot.
#
# Image is pushed to ECR `330422590279.dkr.ecr.us-west-2.amazonaws.com/quill-parent`
# with tag `parent-aws-release-<sha>`. Phase 4's launch template
# user-data pulls this image and runs it with `--network host` so it
# can bind 8443/8444 directly and reach AF_VSOCK without bridge-NAT.
#
# Auth: same OIDC role as the enclave workflow
# (`quill-enclave-github-deployer`).

name: Deploy AWS parent (Nitro host)

on:
  push:
    branches: [main]
    paths:
      - "parent/**"
      - ".github/workflows/deploy-parent-aws.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-parent-aws
  cancel-in-progress: false

permissions:
  actions: read     # for the CI-green gate (gh run list)
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: "330422590279"
  ECR_REPO: quill-parent
  DOCKERFILE: Dockerfile.parent

jobs:
  # Full-repo CI gate: ci.yml (every build-tag variant + the parent
  # Python tests + trust-page validation) must conclude SUCCESS for this
  # exact SHA before any production rollout. The inline `test` job only
  # covers this build's slice — the parent test job sat red on main
  # across a week of deploys before this gate existed (fixed 2026-06-10).
  # Manual workflow_dispatch skips the gate (operator override).
  gate-on-ci:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for CI green (same commit)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::warning::manual dispatch — skipping the CI-green gate."
            exit 0
          fi
          echo "waiting for ci.yml on ${GITHUB_SHA}"
          deadline=$(( $(date +%s) + 2700 ))   # 45 min, far above CI's normal runtime
          while true; do
            run_json=$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow ci.yml \
              --commit "${GITHUB_SHA}" \
              --json databaseId,status,conclusion \
              --jq '.[0]' || true)
            if [ -n "${run_json}" ] && [ "${run_json}" != "null" ]; then
              status=$(jq -r '.status' <<<"${run_json}")
              conclusion=$(jq -r '.conclusion' <<<"${run_json}")
              echo "  ci run $(jq -r '.databaseId' <<<"${run_json}"): status=${status} conclusion=${conclusion:-<pending>}"
              if [ "${status}" = "completed" ]; then
                if [ "${conclusion}" = "success" ]; then
                  echo "CI is green — proceeding."
                  exit 0
                fi
                echo "CI concluded '${conclusion}' for ${GITHUB_SHA} — refusing to deploy a red commit."
                exit 1
              fi
            else
              echo "  no CI run found yet for ${GITHUB_SHA} (queueing?)"
            fi
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "timed out after 45 min waiting for CI"
              exit 1
            fi
            sleep 20
          done

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parent
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install --no-cache-dir uv==0.5.5
      - name: Sync dev deps
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest -x

  build-and-push:
    needs: [test, gate-on-ci]
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
      image_digest: ${{ steps.build.outputs.image_digest }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHA="$(git rev-parse --short HEAD)"
          IMAGE_TAG="parent-aws-release-${SHA}"
          IMAGE_REF="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${IMAGE_TAG}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/quill-enclave-github-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # The parent's base image (python:3.12-slim-bookworm) is pinned by
      # digest. Same QEMU + buildx setup as the enclave workflow so the
      # base manifest's platform doesn't fight the runner.
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - id: build
        name: Build + push parent image to ECR
        working-directory: parent
        run: |
          set -euo pipefail
          IMAGE_REF="${{ steps.vars.outputs.image_ref }}"

          # m5n.xlarge is amd64. Build amd64-native to avoid runtime
          # emulation cost on the host (the parent's TCP pump path is
          # latency-sensitive — every prompt's bytes flow through it).
          docker buildx build \
            --platform=linux/amd64 \
            --file="${DOCKERFILE}" \
            --tag="${IMAGE_REF}" \
            --push \
            .

          DIGEST=$(aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --image-ids "imageTag=${{ steps.vars.outputs.image_tag }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${IMAGE_REF}@${DIGEST}"
