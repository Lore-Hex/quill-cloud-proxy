name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  enclave:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enclave
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Sync
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check src tests
      - name: Format
        run: uv run ruff format --check src tests
      - name: Typecheck (mypy --strict, py3.11)
        run: uv run mypy --strict --python-version 3.11 src tests
      - name: Test
        run: uv run pytest -v

  parent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Sync
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check src tests
      - name: Format
        run: uv run ruff format --check src tests
      - name: Typecheck (mypy --strict, py3.11)
        run: uv run mypy --strict --python-version 3.11 src tests
      - name: Test
        run: uv run pytest -v

  trust-page-validation:
    # Catches accidental script tags / external font fetches / etc. on
    # the static trust page before publish.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert trust page contains no <script> tags
        run: |
          if grep -qi '<script' trust-page/index.html; then
            echo "trust page must not contain <script>" >&2
            exit 1
          fi
      - name: Assert trust page contains no third-party fetches
        run: |
          # Allow only github.com + aws docs subdomains. Reject anything else.
          # We extract every https URL, then filter by the allowlist; if any URL
          # remains, fail.
          grep -oE 'https?://[^"[:space:])]+' trust-page/index.html | sort -u > /tmp/urls.txt
          grep -vE '^https?://(github\.com|aws\.amazon\.com|docs\.aws\.amazon\.com|[a-z0-9.-]+\.amazonaws\.com)(/|$)' /tmp/urls.txt > /tmp/violations.txt || true
          if [ -s /tmp/violations.txt ]; then
            echo "trust page contains disallowed external URLs:" >&2
            cat /tmp/violations.txt >&2
            exit 1
          fi
