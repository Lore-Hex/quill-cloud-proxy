# Auto-deploy the GCP enclave (the attested workload) on push to main.
#
# This is the trust-critical workflow. Customers verifying
# https://trust.trustedrouter.com/ are reading artifacts produced by THIS
# job. Each release:
#   1. Builds the enclave image via Cloud Build (no human in the build path)
#   2. Resolves the immutable OCI digest from Artifact Registry
#   3. Writes that digest into trust-page/{image-digest-gcp.txt,
#      image-reference-gcp.txt, gcp-release.json}
#   4. Auto-commits those trust artifacts back to main, attributed to
#      this workflow run by SHA + run-id
#   5. Rolls the GCP MIG so the running workload matches the new digest
#   6. Smoke-tests an inference call against the rolled workload
#   7. Publishes trust-page/ to GitHub Pages — which serves
#      https://trust.trustedrouter.com/. Verifiers can diff the GitHub
#      tree against the live page byte-for-byte.
#
# The trust story this enables: any auditor can pick a commit, find the
# GHA run that built it, see the public workflow definition, see the
# resolved digest, and verify the running enclave matches. No human in
# the build path. No "Joseph's MacBook" trust dependency.

name: Deploy GCP enclave (attested workload)

on:
  push:
    branches: [main]
    paths:
      - "enclave-go/**"
      - "tools/release-gcp.sh"
      - "tools/deploy-gcp-mig.sh"
      - ".github/workflows/deploy-enclave-gcp.yml"
      # Note: trust-page/** is intentionally NOT in this list. Trust
      # artifacts are *output* of this workflow, not input — listing them
      # would create an infinite-loop trigger when the workflow auto-
      # commits its own digest update.
  workflow_dispatch: {}

concurrency:
  group: deploy-enclave-gcp
  cancel-in-progress: false

permissions:
  actions: read     # for the CI-green gate (gh run list)
  id-token: write   # for Workload Identity Federation
  contents: write   # to commit trust-page/ artifacts back to main
  pages: write      # for the publish-trust-page job

env:
  PROJECT_ID: quill-cloud-proxy
  REGION: us-central1
  ARTIFACT_REPO: quill
  IMAGE_NAME: enclave-multi
  DOCKERFILE: Dockerfile.enclave.gcp.multi

jobs:
  # Full-repo CI gate: ci.yml (every build-tag variant + the parent
  # Python tests + trust-page validation) must conclude SUCCESS for this
  # exact SHA before any production rollout. The inline `test` job only
  # covers this build's slice — the parent test job sat red on main
  # across a week of deploys before this gate existed (fixed 2026-06-10).
  # Manual workflow_dispatch skips the gate (operator override).
  gate-on-ci:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for CI green (same commit)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::warning::manual dispatch — skipping the CI-green gate."
            exit 0
          fi
          echo "waiting for ci.yml on ${GITHUB_SHA}"
          deadline=$(( $(date +%s) + 2700 ))   # 45 min, far above CI's normal runtime
          while true; do
            run_json=$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow ci.yml \
              --commit "${GITHUB_SHA}" \
              --json databaseId,status,conclusion \
              --jq '.[0]' || true)
            if [ -n "${run_json}" ] && [ "${run_json}" != "null" ]; then
              status=$(jq -r '.status' <<<"${run_json}")
              conclusion=$(jq -r '.conclusion' <<<"${run_json}")
              echo "  ci run $(jq -r '.databaseId' <<<"${run_json}"): status=${status} conclusion=${conclusion:-<pending>}"
              if [ "${status}" = "completed" ]; then
                if [ "${conclusion}" = "success" ]; then
                  echo "CI is green — proceeding."
                  exit 0
                fi
                echo "CI concluded '${conclusion}' for ${GITHUB_SHA} — refusing to deploy a red commit."
                exit 1
              fi
            else
              echo "  no CI run found yet for ${GITHUB_SHA} (queueing?)"
            fi
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "timed out after 45 min waiting for CI"
              exit 1
            fi
            sleep 20
          done

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enclave-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test -tags 'cloud_gcp,llm_multi' ./...

  build-and-release:
    needs: [test, gate-on-ci]
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.set-vars.outputs.image_ref }}
      image_digest: ${{ steps.resolve-digest.outputs.image_digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history for the auto-commit + push back

      - id: set-vars
        run: |
          SHA="$(git rev-parse --short HEAD)"
          IMAGE_TAG="gcp-release-${SHA}"
          IMAGE_REF="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "SHA=${SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/44325983244/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: tr-deploy@quill-cloud-proxy.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker auth (for image describe)
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build enclave image via Cloud Build
        working-directory: enclave-go
        # The Dockerfile pins its golang:1.24-bookworm base image to a
        # single-arch digest (arm64, since it was originally generated on
        # a Mac). Cloud Build runners are amd64. Without QEMU + buildx,
        # docker can't pull/run the arm64 builder. Steps below install
        # QEMU emulators, set up a buildx builder, then cross-build the
        # final amd64 image — matches what local docker-buildx-on-Mac
        # has been producing.
        run: |
          set -euo pipefail
          cat > /tmp/cloudbuild-enclave.yaml <<'EOF'
          steps:
            - name: gcr.io/cloud-builders/docker
              entrypoint: bash
              args:
                - -c
                - |
                  set -e
                  docker run --privileged --rm tonistiigi/binfmt --install arm64,amd64
                  docker buildx create --use --name=enclave-builder
                  docker buildx inspect --bootstrap
                  docker buildx build --platform=linux/amd64 \
                    --file=${_DOCKERFILE} \
                    --tag=${_IMAGE} \
                    --push \
                    .
          options:
            machineType: E2_HIGHCPU_8
          EOF
          BUILD_ID=$(gcloud builds submit \
            --config=/tmp/cloudbuild-enclave.yaml \
            --substitutions="_IMAGE=${IMAGE_REF},_DOCKERFILE=${DOCKERFILE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --async \
            --format='value(id)' \
            .)
          echo "build id: ${BUILD_ID}"
          while true; do
            STATUS=$(gcloud builds describe "${BUILD_ID}" \
              --project="${PROJECT_ID}" --region="${REGION}" \
              --format='value(status)')
            echo "  status: ${STATUS}"
            case "${STATUS}" in
              SUCCESS) break ;;
              FAILURE|TIMEOUT|CANCELLED|EXPIRED) echo "build ${STATUS}"; exit 1 ;;
            esac
            sleep 8
          done

      - id: resolve-digest
        name: Resolve image digest
        run: |
          DIGEST=$(gcloud artifacts docker images describe "${IMAGE_REF}" \
            --format='value(image_summary.digest)')
          [[ -n "${DIGEST}" ]] || { echo "could not resolve digest"; exit 1; }
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "DIGEST=${DIGEST}" >> "$GITHUB_ENV"

      - name: Write trust-page artifacts
        run: |
          set -euo pipefail
          python3 tools/write-trust-artifacts.py \
            --out-dir trust-page \
            --commit "${SHA}" \
            --image-reference "${IMAGE_REF}" \
            --image-digest "${DIGEST}"

      - name: Commit trust artifacts back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trust-page/image-digest-gcp.txt trust-page/image-reference-gcp.txt trust-page/gcp-release.json trust-page/index.html trust-page/trust
          if git diff --cached --quiet; then
            echo "trust-page artifacts unchanged; nothing to commit"
          else
            git commit -m "[bot] enclave release ${SHA}: digest ${DIGEST}"
            git push origin HEAD:main
          fi

  rollout:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pull the auto-commit just made
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/44325983244/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: tr-deploy@quill-cloud-proxy.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - uses: astral-sh/setup-uv@v5

      - name: Reconcile enclave DNS
        env:
          QUILL_RECONCILE_APPLY: "1"
          QUILL_API_HOST: api.trustedrouter.com
          QUILL_DNS_ZONE: trustedrouter-com
          QUILL_PUBLISH_REGIONAL: "1"
          QUILL_REGIONAL_ZONE: quillrouter-com
          QUILL_REGIONAL_SUFFIX: quillrouter.com
        run: uv run --script tools/reconcile-enclave-dns.py --apply

      - name: Capture pre-rollout templates (for rollback)
        # The MIG keeps every prior instance template, so we just need
        # to remember which one was bound before the rollout started.
        # If the watchdog trips, the rollback step points the MIG back
        # at this template and recreates instances on it.
        id: prev
        run: |
          for pair in "us-central1:quill-enclave-mig-us" "europe-west4:quill-enclave-mig-eu" "us-east4:quill-enclave-mig-useast4"; do
            region="${pair%%:*}"
            mig="${pair##*:}"
            tmpl=$(gcloud compute instance-groups managed describe "$mig" \
              --region="$region" --project=quill-cloud-proxy \
              --format='value(versions[0].instanceTemplate)' 2>/dev/null || true)
            tmpl_short=$(basename "$tmpl")
            key="${region//-/_}_template"
            echo "${key}=${tmpl_short}" >> "$GITHUB_OUTPUT"
            echo "  pre-rollout ${region}: ${tmpl_short:-<none>}"
          done

      # Staged regional rollout. Roll us-central1 first, gate on a
      # 3-min single-region synthetic watch; only proceed to
      # europe-west4 if us-central1 stays up. A bad image reaches at
      # most one region before the gate catches it.

      - name: Roll the GCP MIG (us-central1)
        env:
          IMAGE_REF: ${{ needs.build-and-release.outputs.image_ref }}
          IMAGE_DIGEST: ${{ needs.build-and-release.outputs.image_digest }}
          # us-central1 serves the canonical global convenience hostname, the
          # explicit regional SDK retry hostname, AND api.trustedrouter.com
          # (the brand-consolidated alias that CNAMEs to api.quillrouter.com,
          # so it rides the same multi-cloud LB and lands here). The enclave
          # ACME manager whitelists every SNI value and issues separate cached
          # certs as needed; TLS still terminates only inside the attested
          # workload.
          API_HOST: api.quillrouter.com,api-us-central1.quillrouter.com,api.trustedrouter.com
          # REGION_SHORT must match the existing prod MIG suffix —
          # `quill-enclave-mig-us`, not `quill-enclave-mig-uscentral1`.
          REGION_SHORT: us
        run: bash tools/deploy-gcp-mig.sh us-central1

      - name: Wait for us-central1 MIG to be stable
        # Block until the rolling-replace finishes draining the old
        # instances. We *want* the canary below to measure post-roll
        # steady state, not the mid-roll drain window where probes
        # naturally flap as instances cycle. Timeout caps a stuck
        # rollout — 15 min is generous; a healthy roll is 5-10 min.
        timeout-minutes: 15
        run: |
          gcloud compute instance-groups managed wait-until quill-enclave-mig-us \
            --region=us-central1 --project=quill-cloud-proxy --stable

      - name: Wait for us-central1 instances to attest healthy
        # MIG-stable != attestation-healthy: Confidential Space GCA tokens are
        # not ready until ~5-8 min after boot, and the reconciler only publishes
        # attested instances. Without this gate the post-stable canary measures
        # the boot transient (synthetic reads the region DOWN) and rolls a good
        # release back — exactly what tripped europe-west4 on 2026-06-20.
        timeout-minutes: 14
        run: bash tools/wait-region-attested.sh quill-enclave-mig-us- us-central1

      - name: Reconcile DNS before us-central1 canary
        env:
          QUILL_RECONCILE_APPLY: "1"
          QUILL_API_HOST: api.trustedrouter.com
          QUILL_DNS_ZONE: trustedrouter-com
          QUILL_PUBLISH_REGIONAL: "1"
          QUILL_REGIONAL_ZONE: quillrouter-com
          QUILL_REGIONAL_SUFFIX: quillrouter.com
        run: uv run --script tools/reconcile-enclave-dns.py --apply

      - name: Wait for us-central1 synthetic up
        # The canary reads status.json; wait until the synthetic monitor has
        # re-probed this freshly-rolled region as up so the canary measures
        # steady state, not the post-roll boot transient (the regional endpoint
        # is briefly unreachable mid-replace -> false down -> false rollback).
        timeout-minutes: 12
        env:
          WAIT_UP_SLEEP: "10"
          WAIT_UP_ROUNDS: "72"
        run: |
          gcloud scheduler jobs run trusted-router-synthetic-us-central1-every-minute \
            --location=us-central1 --project=quill-cloud-proxy || true
          bash tools/wait-region-synthetic-up.sh us-central1 us-central1

      - name: Canary gate — watch us-central1 only (3 min, post-stable)
        id: canary_us
        continue-on-error: true
        run: python3 tools/watchdog.py --regions us-central1 --duration-min 3 --rollback-after 2 --skip-baseline

      - name: Rollback us-central1 MIG + abort (canary tripped)
        if: ${{ steps.canary_us.outcome == 'failure' && steps.canary_us.outputs.rollback_regions != '' }}
        env:
          PREV_US: ${{ steps.prev.outputs.us_central1_template }}
        run: |
          set -euo pipefail
          if [ -z "${PREV_US}" ]; then
            echo "no prior us-central1 template recorded; cannot rollback"
            exit 1
          fi
          echo "us-central1 canary failed; pointing MIG back at ${PREV_US}"
          gcloud compute instance-groups managed set-instance-template quill-enclave-mig-us \
            --region=us-central1 --project=quill-cloud-proxy \
            --template="${PREV_US}" --quiet
          gcloud compute instance-groups managed rolling-action replace quill-enclave-mig-us \
            --region=us-central1 --project=quill-cloud-proxy \
            --max-unavailable=0 --max-surge=3 --quiet
          echo "europe-west4 NEVER received the bad image; safe."
          exit 1

      - name: Roll the GCP MIG (europe-west4)
        env:
          IMAGE_REF: ${{ needs.build-and-release.outputs.image_ref }}
          IMAGE_DIGEST: ${{ needs.build-and-release.outputs.image_digest }}
          # Every region must whitelist the canonical SNIs, not just its
          # regional name: with the reconciler/DNS architecture (no L7 LB),
          # clients connect directly to in-region enclaves using
          # api.quillrouter.com / api.trustedrouter.com. A regional-only
          # API_HOST makes autocert reject the canonical SNI (TLS internal
          # error) and the attest-by-canonical-host reconciler drop the region.
          API_HOST: api.quillrouter.com,api-europe-west4.quillrouter.com,api.trustedrouter.com
          REGION_SHORT: eu
          # europe-west4 matches us-east4's working Confidential Space profile:
          # Intel TDX on c3. The prior n2d/SEV-SNP EU instances booted but did
          # not accept TCP:443, so the DNS reconciler correctly kept EU out.
          MACHINE_TYPE: c3-standard-4
          CONF_COMPUTE_TYPE: TDX
        run: bash tools/deploy-gcp-mig.sh europe-west4

      - name: Wait for europe-west4 MIG to be stable
        # See us-central1 wait step — same rationale. eu is where this
        # mattered most: prior runs had the cross-region final watchdog
        # firing mid-drain on eu and rolling it back every time.
        timeout-minutes: 15
        run: |
          gcloud compute instance-groups managed wait-until quill-enclave-mig-eu \
            --region=europe-west4 --project=quill-cloud-proxy --stable

      - name: Wait for europe-west4 instances to attest healthy
        # See us-central1 gate. eu is where the boot-transient canary trip
        # actually fired (up->down->down, then healthy ~7 min later).
        timeout-minutes: 14
        run: bash tools/wait-region-attested.sh quill-enclave-mig-eu- europe-west4

      - name: Reconcile DNS before europe-west4 canary
        env:
          QUILL_RECONCILE_APPLY: "1"
          QUILL_API_HOST: api.trustedrouter.com
          QUILL_DNS_ZONE: trustedrouter-com
          QUILL_PUBLISH_REGIONAL: "1"
          QUILL_REGIONAL_ZONE: quillrouter-com
          QUILL_REGIONAL_SUFFIX: quillrouter.com
        run: uv run --script tools/reconcile-enclave-dns.py --apply

      - name: Wait for europe-west4 synthetic up
        # See us-central1. eu is where the boot-transient false-down repeatedly
        # tripped the canary while the region was actually healthy.
        timeout-minutes: 12
        env:
          WAIT_UP_SLEEP: "10"
          WAIT_UP_ROUNDS: "72"
        run: |
          gcloud scheduler jobs run trusted-router-synthetic-europe-west4-every-minute \
            --location=europe-west4 --project=quill-cloud-proxy || true
          bash tools/wait-region-synthetic-up.sh europe-west4 europe-west4

      - name: Canary gate — watch europe-west4 only (3 min, post-stable)
        id: canary_eu
        continue-on-error: true
        run: python3 tools/watchdog.py --regions europe-west4 --duration-min 3 --rollback-after 2 --skip-baseline

      - name: Rollback europe-west4 MIG + abort (canary tripped)
        if: ${{ steps.canary_eu.outcome == 'failure' && steps.canary_eu.outputs.rollback_regions != '' }}
        env:
          PREV_EU: ${{ steps.prev.outputs.europe_west4_template }}
        run: |
          set -euo pipefail
          if [ -z "${PREV_EU}" ]; then
            echo "no prior europe-west4 template recorded; cannot rollback"
            exit 1
          fi
          echo "europe-west4 canary failed; pointing MIG back at ${PREV_EU}"
          gcloud compute instance-groups managed set-instance-template quill-enclave-mig-eu \
            --region=europe-west4 --project=quill-cloud-proxy \
            --template="${PREV_EU}" --quiet
          gcloud compute instance-groups managed rolling-action replace quill-enclave-mig-eu \
            --region=europe-west4 --project=quill-cloud-proxy \
            --max-unavailable=0 --max-surge=3 --quiet
          echo "us-central1 keeps the new release."
          exit 1

      - name: Roll the GCP MIG (us-east4)
        env:
          IMAGE_REF: ${{ needs.build-and-release.outputs.image_ref }}
          IMAGE_DIGEST: ${{ needs.build-and-release.outputs.image_digest }}
          API_HOST: api.quillrouter.com,api-us-east4.quillrouter.com,api.trustedrouter.com
          REGION_SHORT: useast4
          # us-east4 runs Intel TDX (c3-*), not AMD SEV-SNP: n2d capacity is
          # chronically short here, so the live region is c3-standard-4/TDX.
          MACHINE_TYPE: c3-standard-4
          CONF_COMPUTE_TYPE: TDX
        run: bash tools/deploy-gcp-mig.sh us-east4

      - name: Wait for us-east4 MIG to be stable
        # See us-central1 wait step — same rationale.
        timeout-minutes: 15
        run: |
          gcloud compute instance-groups managed wait-until quill-enclave-mig-useast4 \
            --region=us-east4 --project=quill-cloud-proxy --stable

      - name: Wait for us-east4 instances to attest healthy
        # See us-central1 gate.
        timeout-minutes: 14
        run: bash tools/wait-region-attested.sh quill-enclave-mig-useast4- us-east4

      - name: Reconcile DNS before us-east4 canary
        env:
          QUILL_RECONCILE_APPLY: "1"
          QUILL_API_HOST: api.trustedrouter.com
          QUILL_DNS_ZONE: trustedrouter-com
          QUILL_PUBLISH_REGIONAL: "1"
          QUILL_REGIONAL_ZONE: quillrouter-com
          QUILL_REGIONAL_SUFFIX: quillrouter.com
        run: uv run --script tools/reconcile-enclave-dns.py --apply

      - name: Wait for us-east4 synthetic up
        # See us-central1.
        timeout-minutes: 12
        env:
          WAIT_UP_SLEEP: "10"
          WAIT_UP_ROUNDS: "72"
        run: |
          # us-east4 is currently covered by the us-central1 synthetic worker.
          gcloud scheduler jobs run trusted-router-synthetic-us-central1-every-minute \
            --location=us-central1 --project=quill-cloud-proxy || true
          bash tools/wait-region-synthetic-up.sh us-east4 us-east4

      - name: Canary gate — watch us-east4 only (3 min, post-stable)
        id: canary_useast4
        continue-on-error: true
        run: python3 tools/watchdog.py --regions us-east4 --duration-min 3 --rollback-after 2 --skip-baseline

      - name: Rollback us-east4 MIG + abort (canary tripped)
        if: ${{ steps.canary_useast4.outcome == 'failure' && steps.canary_useast4.outputs.rollback_regions != '' }}
        env:
          PREV_USEAST4: ${{ steps.prev.outputs.us_east4_template }}
        run: |
          set -euo pipefail
          if [ -z "${PREV_USEAST4}" ]; then
            echo "no prior us-east4 template recorded; cannot rollback"
            exit 1
          fi
          echo "us-east4 canary failed; pointing MIG back at ${PREV_USEAST4}"
          gcloud compute instance-groups managed set-instance-template quill-enclave-mig-useast4 \
            --region=us-east4 --project=quill-cloud-proxy \
            --template="${PREV_USEAST4}" --quiet
          gcloud compute instance-groups managed rolling-action replace quill-enclave-mig-useast4 \
            --region=us-east4 --project=quill-cloud-proxy \
            --max-unavailable=0 --max-surge=3 --quiet
          echo "us-central1 + europe-west4 keep the new release."
          exit 1

      # No cross-region "final watchdog" step. Each region's health is
      # gated by its own per-region canary above (us-central1 canary
      # watches only us-central1 probes; europe-west4 canary watches
      # only europe-west4 probes), and each canary runs AFTER its
      # region's MIG has reached stable state (via `wait-until --stable`)
      # so the probe set is steady-state — not mid-roll where probes
      # naturally flap on TCP-ready-but-TLS-warming-up instances.
      #
      # The prior cross-region 10-min watchdog at this point was the
      # cause of the recurring eu-rollback pattern in 2026-05: it
      # always ran while eu was still mid-drain on the rolling-action
      # (us deploys first, then eu, so the final watchdog window
      # overlaps eu's drain phase by construction). The per-region
      # canary alone is the right gate.

      - name: Smoke test enclave inference (non-blocking)
        # Non-blocking: MIG health checks gate the rollout. This smoke
        # confirms the public SDK path with the dedicated synthetic
        # monitor key/model, and every request is bounded so a slow
        # provider cannot pin the deploy job indefinitely.
        # GHA quirk: secrets can't be used in a top-level `if:`
        # expression, so we gate via env var and fall back to Secret
        # Manager when the GitHub secret is not configured.
        env:
          SMOKE_KEY: ${{ secrets.SMOKE_TEST_API_KEY }}
        continue-on-error: true
        run: |
          if [ -z "${SMOKE_KEY}" ]; then
            SMOKE_KEY="$(gcloud secrets versions access latest \
              --secret=trustedrouter-synthetic-monitor-api-key \
              --project=quill-cloud-proxy 2>/dev/null || true)"
          fi
          if [ -z "${SMOKE_KEY}" ]; then
            echo "smoke skipped: no SMOKE_TEST_API_KEY or synthetic monitor secret"
            exit 0
          fi
          for attempt in $(seq 1 3); do
            response=$(curl -sw "\n%{http_code}" \
              --silent --show-error --max-time 60 \
              -H "authorization: Bearer ${SMOKE_KEY}" \
              -H "content-type: application/json" \
              -d '{"model":"trustedrouter/monitor","messages":[{"role":"user","content":"reply exactly PONG"}],"max_tokens":32}' \
              https://api.quillrouter.com/v1/chat/completions || true)
            code=$(echo "$response" | tail -n1)
            echo "attempt ${attempt}: HTTP ${code}"
            if [ "$code" = "200" ]; then
              echo "smoke ok — synthetic monitor route live on prod"
              exit 0
            fi
            sleep 5
          done
          echo "smoke didn't observe a 200 within bounded retry window"
          # exit 0 — non-blocking

  # Publish trust-page/ to GitHub Pages. Pages serves
  # https://trust.trustedrouter.com once you add a CNAME at your DNS
  # provider: `trust.trustedrouter.com → lore-hex.github.io`. Until DNS
  # is in place, the page is reachable at
  # https://lore-hex.github.io/quill-cloud-proxy/.
  publish-trust-page:
    needs: [build-and-release, rollout]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pull the auto-commit with the new digest
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: trust-page/
      - id: deployment
        uses: actions/deploy-pages@v4
