name: Publish trust page

on:
  push:
    branches: [main]
    paths:
      - "trust-page/**"
      - ".github/workflows/publish-trust-page.yml"
  # Backstop: the deploy workflow commits trust artifacts with GITHUB_TOKEN,
  # and GITHUB_TOKEN pushes never trigger push workflows — so a failed
  # in-run Pages publish used to leave trust.trustedrouter.com serving a
  # stale digest with nothing re-firing it (observed 2026-07-04, run
  # 28720340595). workflow_run fires on deploy completion regardless of the
  # deploy run's conclusion, so the page always gets (re)published from
  # main's current artifacts.
  workflow_run:
    workflows: ["Deploy GCP enclave (attested workload)"]
    types: [completed]
  workflow_dispatch: {}

# Serialize with the deploy workflow's publish-trust-page job (same group
# name there). Concurrent Pages deployments conflict; queueing them is the
# root-cause fix. Publishes are idempotent, so an extra queued run is
# harmless.
concurrency:
  group: trust-pages-deployment
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run checks out the triggering run's head by default;
          # always publish main's current artifacts instead.
          ref: main
      - name: Validate static trust page
        run: |
          set -euo pipefail
          test -f trust-page/index.html
          test -f trust-page/trust/gcp-release.json
          test -f trust-page/trust/image-digest-gcp.txt
          test -f trust-page/trust/image-reference-gcp.txt
          if grep -Rqi '<script' trust-page; then
            echo "trust page must not contain <script>" >&2
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path("trust-page/trust/gcp-release.json").read_text())
          assert release["platform"] == "gcp-confidential-space"
          assert release["data_policy"]["prompt_output_storage"] is False
          assert release["data_policy"]["control_plane_prompt_access"] is False
          assert release["tls"]["hostname"] == "api.trustedrouter.com"
          assert release["source_repositories"]["control_plane"].endswith("/quill-router")
          assert release["source_repositories"]["attested_gateway"].endswith("/quill-cloud-proxy")
          assert release["image_digest"].startswith("sha256:")
          assert release["source_commit"]
          assert Path("trust-page/trust/image-digest-gcp.txt").read_text().strip() == release["image_digest"]
          assert Path("trust-page/trust/image-reference-gcp.txt").read_text().strip() == release["image_reference"]
          PY
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: trust-page/
      - id: deployment
        uses: actions/deploy-pages@v4
        # Pages deployments fail transiently (deployment conflicts, API
        # blips). Don't fail the job on the first attempt; retry once
        # after a backoff below.
        continue-on-error: true
      - name: Backoff before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
      - name: Verify live page matches repo artifacts
        run: |
          set -euo pipefail
          expected="$(cat trust-page/trust/image-digest-gcp.txt)"
          echo "expected digest: ${expected}"
          for attempt in $(seq 1 30); do
            live="$(curl -fsS "https://trust.trustedrouter.com/trust/image-digest-gcp.txt?nocache=${GITHUB_RUN_ID}-${attempt}" || true)"
            if [ "${live}" = "${expected}" ]; then
              echo "live trust page matches repo artifacts"
              exit 0
            fi
            echo "attempt ${attempt}: live='${live}' — waiting for Pages/CDN propagation"
            sleep 20
          done
          echo "live trust page still does not match repo artifacts after 10 minutes" >&2
          exit 1
