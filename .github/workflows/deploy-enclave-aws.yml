# Auto-build the AWS Nitro enclave image on push to main and push it
# to ECR (us-west-2). Mirrors deploy-enclave-gcp.yml but for the
# `cloud_aws,llm_multi` build target.
#
# What this workflow does:
#   1. Runs `go test` against `cloud_aws,llm_multi` (catches AWS-build
#      regressions before they reach the registry).
#   2. Builds the enclave image with docker buildx (GitHub Actions
#      runners are already linux/amd64, no QEMU needed — vs GCP's
#      Cloud-Build path which needs QEMU because buildx runs from a
#      Mac sometimes).
#   3. Pushes to ECR `330422590279.dkr.ecr.us-west-2.amazonaws.com/quill-enclave`
#      with tag `aws-release-<sha>`.
#
# What this workflow does NOT do (yet):
#   - Trigger an ASG instance refresh. The compute phase of
#     tools/deploy-aws-nitro.sh isn't wired in production yet (waiting
#     for the AWS m5n vCPU quota approval). Once compute lands, add an
#     `instance-refresh` step here so each new image auto-rolls the
#     ASG.
#   - Update Cloudflare LB pool. The 99/1 weighted DNS pool config
#     points at a stable NLB IP that doesn't change per release.
#
# AWS auth: GitHub OIDC → IAM role `quill-enclave-github-deployer`
# (one-time setup, see the "OIDC role setup" section in
# tools/deploy-aws-nitro.sh comments).

name: Deploy AWS enclave (Nitro multi-cloud)

on:
  push:
    branches: [main]
    paths:
      - "enclave-go/**"
      - "tools/deploy-aws-nitro.sh"
      - "tools/sync-secrets-to-aws.sh"
      - ".github/workflows/deploy-enclave-aws.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-enclave-aws
  cancel-in-progress: false

permissions:
  id-token: write   # for AWS OIDC
  contents: read

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: "330422590279"
  ECR_REPO: quill-enclave
  DOCKERFILE: Dockerfile.enclave   # the unsuffixed Dockerfile is the AWS build target
  BUILD_TAGS: "cloud_aws,llm_multi"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enclave-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test -tags '${{ env.BUILD_TAGS }}' ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
      image_digest: ${{ steps.build.outputs.image_digest }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHA="$(git rev-parse --short HEAD)"
          IMAGE_TAG="aws-release-${SHA}"
          IMAGE_REF="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${IMAGE_TAG}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/quill-enclave-github-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - id: build
        name: Build + push enclave image to ECR
        working-directory: enclave-go
        run: |
          set -euo pipefail
          IMAGE_REF="${{ steps.vars.outputs.image_ref }}"

          # GitHub-hosted runners are linux/amd64. No QEMU needed —
          # the GCP variant uses QEMU because Cloud Build needs to
          # cover the Mac-laptop case; this workflow always runs on
          # an amd64 runner, so a plain `docker build` works.
          docker buildx create --use --name=aws-enclave-builder
          docker buildx build \
            --platform=linux/amd64 \
            --file="${DOCKERFILE}" \
            --build-arg="BUILD_TAGS=${BUILD_TAGS}" \
            --tag="${IMAGE_REF}" \
            --push \
            .

          # Resolve the immutable digest. The trust story for the
          # AWS path matches the GCP path: the digest, not the tag,
          # is what gets verified by attestation tooling.
          DIGEST=$(aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --image-ids "imageTag=${{ steps.vars.outputs.image_tag }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${IMAGE_REF}@${DIGEST}"
