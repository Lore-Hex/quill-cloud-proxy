# Auto-build the AWS Nitro enclave image on push to main and push it
# to ECR (us-west-2). Mirrors deploy-enclave-gcp.yml but for the
# `cloud_aws,llm_multi` build target.
#
# What this workflow does:
#   1. Runs `go test` against `cloud_aws,llm_multi` (catches AWS-build
#      regressions before they reach the registry).
#   2. Builds the enclave image with docker buildx (GitHub Actions
#      runners are already linux/amd64, no QEMU needed — vs GCP's
#      Cloud-Build path which needs QEMU because buildx runs from a
#      Mac sometimes).
#   3. Pushes to ECR `330422590279.dkr.ecr.us-west-2.amazonaws.com/quill-enclave`
#      with tag `aws-release-<sha>`.
#
# What this workflow does NOT do (yet):
#   - Update Cloudflare LB pool. The 99/1 weighted DNS pool config
#     points at a stable NLB IP that doesn't change per release.
#
# Rollout: a third job (`rollout`) runs `deploy-aws-nitro.sh --apply
# --phase compute` after build-and-push lands the new image in ECR.
# That creates a new launch template version and triggers an ASG
# instance refresh with `MinHealthyPercentage=50` so the ASG keeps
# serving at least half its capacity throughout the swap. The job
# polls `describe-instance-refreshes` until completion (`Successful`
# or `Failed`/`Cancelled`) — typically 8-12 min for an m5n.xlarge
# refresh including Nitro init + cold-start ACME.
#
# AWS auth: GitHub OIDC → IAM role `quill-enclave-github-deployer`
# (one-time setup, see the "OIDC role setup" section in
# tools/deploy-aws-nitro.sh comments).

name: Deploy AWS enclave (Nitro multi-cloud)

on:
  push:
    branches: [main]
    paths:
      - "enclave-go/**"
      - "tools/deploy-aws-nitro.sh"
      - "tools/sync-secrets-to-aws.sh"
      - ".github/workflows/deploy-enclave-aws.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-enclave-aws
  cancel-in-progress: false

permissions:
  actions: read     # for the CI-green gate (gh run list)
  id-token: write   # for AWS OIDC
  contents: read

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: "330422590279"
  ECR_REPO: quill-enclave
  DOCKERFILE: Dockerfile.enclave   # the unsuffixed Dockerfile is the AWS build target
  BUILD_TAGS: "cloud_aws,llm_multi"

jobs:
  # Full-repo CI gate: ci.yml (every build-tag variant + the parent
  # Python tests + trust-page validation) must conclude SUCCESS for this
  # exact SHA before any production rollout. The inline `test` job only
  # covers this build's slice — the parent test job sat red on main
  # across a week of deploys before this gate existed (fixed 2026-06-10).
  # Manual workflow_dispatch skips the gate (operator override).
  gate-on-ci:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for CI green (same commit)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::warning::manual dispatch — skipping the CI-green gate."
            exit 0
          fi
          echo "waiting for ci.yml on ${GITHUB_SHA}"
          deadline=$(( $(date +%s) + 2700 ))   # 45 min, far above CI's normal runtime
          while true; do
            run_json=$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow ci.yml \
              --commit "${GITHUB_SHA}" \
              --json databaseId,status,conclusion \
              --jq '.[0]' || true)
            if [ -n "${run_json}" ] && [ "${run_json}" != "null" ]; then
              status=$(jq -r '.status' <<<"${run_json}")
              conclusion=$(jq -r '.conclusion' <<<"${run_json}")
              echo "  ci run $(jq -r '.databaseId' <<<"${run_json}"): status=${status} conclusion=${conclusion:-<pending>}"
              if [ "${status}" = "completed" ]; then
                if [ "${conclusion}" = "success" ]; then
                  echo "CI is green — proceeding."
                  exit 0
                fi
                echo "CI concluded '${conclusion}' for ${GITHUB_SHA} — refusing to deploy a red commit."
                exit 1
              fi
            else
              echo "  no CI run found yet for ${GITHUB_SHA} (queueing?)"
            fi
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "timed out after 45 min waiting for CI"
              exit 1
            fi
            sleep 20
          done

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enclave-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test -tags '${{ env.BUILD_TAGS }}' ./...

  build-and-push:
    needs: [test, gate-on-ci]
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
      image_digest: ${{ steps.build.outputs.image_digest }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHA="$(git rev-parse --short HEAD)"
          IMAGE_TAG="aws-release-${SHA}"
          IMAGE_REF="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${IMAGE_TAG}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/quill-enclave-github-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Enable QEMU emulation so we can run Dockerfile.enclave's
      # digest-pinned base image regardless of which arch its manifest
      # selects. The base `FROM golang:1.24-bookworm@sha256:...` line
      # is pinned to a specific platform's digest (currently arm64,
      # matching the Mac dev path). On GCP, Cloud Build runs QEMU
      # implicitly so this Just Works. GitHub-hosted runners are
      # amd64-native with no QEMU by default, so without this step the
      # build fails with "exec /bin/sh: exec format error" the moment
      # the first RUN layer fires.
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - id: build
        name: Build + push enclave image to ECR
        working-directory: enclave-go
        run: |
          set -euo pipefail
          IMAGE_REF="${{ steps.vars.outputs.image_ref }}"

          # `--platform=linux/amd64` is what we deploy to AWS Nitro
          # (m5n.xlarge is x86_64). Combined with QEMU above, buildx
          # selects the linux/amd64 variant of the digest-pinned base
          # image (or emulates if the digest is arch-specific). The
          # final image we push is linux/amd64 native — Nitro doesn't
          # tolerate emulation in the runtime guest.
          docker buildx build \
            --platform=linux/amd64 \
            --file="${DOCKERFILE}" \
            --build-arg="BUILD_TAGS=${BUILD_TAGS}" \
            --tag="${IMAGE_REF}" \
            --push \
            .

          # Resolve the immutable digest. The trust story for the
          # AWS path matches the GCP path: the digest, not the tag,
          # is what gets verified by attestation tooling.
          DIGEST=$(aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --image-ids "imageTag=${{ steps.vars.outputs.image_tag }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${IMAGE_REF}@${DIGEST}"

  rollout:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/quill-enclave-github-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Capture pre-rollout launch template version (for rollback)
        id: prev
        run: |
          set -euo pipefail
          PREV_VERSION=$(aws ec2 describe-launch-templates \
            --launch-template-names quill-enclave-lt \
            --region ${AWS_REGION} \
            --query 'LaunchTemplates[0].LatestVersionNumber' --output text 2>/dev/null || echo "")
          echo "prev_version=${PREV_VERSION}" >> "$GITHUB_OUTPUT"
          echo "  pre-rollout launch template version: ${PREV_VERSION:-<none>}"

      - name: Roll new launch template (compute phase)
        # deploy-aws-nitro.sh --phase compute creates a new launch
        # template version that bakes the latest ECR image tag into
        # the cloud-init user-data. Idempotent: re-running with no
        # ECR change is a near-no-op (still creates a new LT version
        # though, since user-data string-compare detection isn't worth
        # the complexity for an infrequent path).
        run: |
          set -euo pipefail
          bash tools/deploy-aws-nitro.sh --apply --phase compute

      - name: Start ASG instance refresh
        # MinHealthyPercentage=50 keeps half the fleet serving while
        # the other half rolls. InstanceWarmup=300 gives each new
        # instance 5 min for Nitro init + ACME cert + bootstrap fetch
        # before considering it healthy for the next rotation step.
        # For backup-region (1% traffic) this is plenty; if AWS ever
        # takes primary traffic, consider bumping to 75% min healthy.
        id: refresh
        run: |
          set -euo pipefail
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name quill-enclave-asg \
            --region ${AWS_REGION} \
            --preferences MinHealthyPercentage=50,InstanceWarmup=300,SkipMatching=false \
            --query 'InstanceRefreshId' --output text)
          echo "refresh_id=${REFRESH_ID}" >> "$GITHUB_OUTPUT"
          echo "  refresh: ${REFRESH_ID}"

      - name: Wait for instance refresh to complete
        # Polls every 30s up to ~20 min. Exits 0 on Successful, 1 on
        # Failed/Cancelled, continues otherwise. Default failure
        # behavior: ASG auto-cancels and reverts (per AWS docs:
        # "if InstanceRefresh fails, the ASG keeps running on its
        # current launch template version").
        run: |
          set -euo pipefail
          REFRESH_ID="${{ steps.refresh.outputs.refresh_id }}"
          for attempt in $(seq 1 40); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name quill-enclave-asg \
              --instance-refresh-ids "${REFRESH_ID}" \
              --region ${AWS_REGION} \
              --query 'InstanceRefreshes[0].Status' --output text)
            PCT=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name quill-enclave-asg \
              --instance-refresh-ids "${REFRESH_ID}" \
              --region ${AWS_REGION} \
              --query 'InstanceRefreshes[0].PercentageComplete' --output text)
            echo "  attempt ${attempt}: status=${STATUS} pct=${PCT}%"
            case "${STATUS}" in
              Successful) echo "  refresh complete"; exit 0 ;;
              Failed|Cancelled|RollbackSuccessful|RollbackFailed)
                echo "  refresh terminal-fail (${STATUS})"
                exit 1
                ;;
            esac
            sleep 30
          done
          echo "  refresh timed out after 20 min; AWS will continue rolling, manually check via console"
          exit 1

      - name: Smoke test enclave inference (non-blocking)
        # Hits the NLB's /v1/models endpoint. Non-blocking — the ASG
        # health check has already gated the rollout, this is purely
        # informational. Auth: pulls synthetic-monitor-api-key from
        # AWS Secrets Manager mirror.
        continue-on-error: true
        run: |
          set -euo pipefail
          NLB_DNS=$(aws elbv2 describe-load-balancers \
            --names quill-enclave-nlb --region ${AWS_REGION} \
            --query 'LoadBalancers[0].DNSName' --output text)
          KEY=$(aws secretsmanager get-secret-value \
            --secret-id quill/trustedrouter-synthetic-monitor-api-key \
            --region ${AWS_REGION} \
            --query SecretString --output text)
          echo "  smoking https://${NLB_DNS}/v1/models"
          for attempt in 1 2 3; do
            code=$(curl -sS -o /tmp/smoke.json -w "%{http_code}" \
              --max-time 15 \
              -H "Authorization: Bearer ${KEY}" \
              "https://${NLB_DNS}/v1/models" || echo "000")
            if [ "${code}" = "200" ]; then
              MODELS=$(python3 -c "import json; print(len(json.load(open('/tmp/smoke.json')).get('data', [])))")
              echo "  smoke ok: HTTP 200, ${MODELS} models"
              exit 0
            fi
            echo "  attempt ${attempt}: HTTP ${code}; retry in 30s"
            sleep 30
          done
          echo "  smoke didn't get a 200 in 3 tries; NOT failing the workflow (informational only)"
