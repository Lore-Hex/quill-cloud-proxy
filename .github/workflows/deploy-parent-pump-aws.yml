# Auto-build the Go parent-pump container image on push to main and
# push it to ECR (us-west-2). Mirrors deploy-enclave-aws.yml but for
# enclave-go/cmd/parent-pump (the Go replacement for the Python TCP
# pump in parent/src/quill_parent/tcp_relay.py).
#
# What this workflow does:
#   1. Runs `go test` against ./cmd/parent-pump/ (the test suite is
#      net.Pipe-based and runs on a vanilla Linux runner — no vsock
#      kernel module needed).
#   2. Builds the linux/amd64 Docker image from Dockerfile.parent-pump
#      (multi-stage → scratch).
#   3. Pushes to ECR `quill-parent-pump` with tag
#      `parent-pump-aws-release-<sha>`.
#
# Auth: same OIDC role as the enclave + parent workflows
# (`quill-enclave-github-deployer`).

name: Deploy AWS parent-pump (Go data-path)

on:
  push:
    branches: [main]
    paths:
      - "enclave-go/cmd/parent-pump/**"
      - "enclave-go/Dockerfile.parent-pump"
      - "enclave-go/go.mod"
      - "enclave-go/go.sum"
      - ".github/workflows/deploy-parent-pump-aws.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-parent-pump-aws
  cancel-in-progress: false

permissions:
  actions: read     # for the CI-green gate (gh run list)
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: "330422590279"
  ECR_REPO: quill-parent-pump
  DOCKERFILE: Dockerfile.parent-pump

jobs:
  # Full-repo CI gate: ci.yml (every build-tag variant + the parent
  # Python tests + trust-page validation) must conclude SUCCESS for this
  # exact SHA before any production rollout. The inline `test` job only
  # covers this build's slice — the parent test job sat red on main
  # across a week of deploys before this gate existed (fixed 2026-06-10).
  # Manual workflow_dispatch skips the gate (operator override).
  gate-on-ci:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for CI green (same commit)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::warning::manual dispatch — skipping the CI-green gate."
            exit 0
          fi
          echo "waiting for ci.yml on ${GITHUB_SHA}"
          deadline=$(( $(date +%s) + 2700 ))   # 45 min, far above CI's normal runtime
          while true; do
            run_json=$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow ci.yml \
              --commit "${GITHUB_SHA}" \
              --json databaseId,status,conclusion \
              --jq '.[0]' || true)
            if [ -n "${run_json}" ] && [ "${run_json}" != "null" ]; then
              status=$(jq -r '.status' <<<"${run_json}")
              conclusion=$(jq -r '.conclusion' <<<"${run_json}")
              echo "  ci run $(jq -r '.databaseId' <<<"${run_json}"): status=${status} conclusion=${conclusion:-<pending>}"
              if [ "${status}" = "completed" ]; then
                if [ "${conclusion}" = "success" ]; then
                  echo "CI is green — proceeding."
                  exit 0
                fi
                echo "CI concluded '${conclusion}' for ${GITHUB_SHA} — refusing to deploy a red commit."
                exit 1
              fi
            else
              echo "  no CI run found yet for ${GITHUB_SHA} (queueing?)"
            fi
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "timed out after 45 min waiting for CI"
              exit 1
            fi
            sleep 20
          done

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enclave-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test ./cmd/parent-pump/...

  build-and-push:
    needs: [test, gate-on-ci]
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
      image_digest: ${{ steps.build.outputs.image_digest }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHA="$(git rev-parse --short HEAD)"
          IMAGE_TAG="parent-pump-aws-release-${SHA}"
          IMAGE_REF="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${IMAGE_TAG}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/quill-enclave-github-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Same QEMU + buildx setup as the enclave workflow because the
      # base image (golang:1.24-bookworm) is pinned by digest.
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - id: build
        name: Build + push parent-pump image to ECR
        working-directory: enclave-go
        run: |
          set -euo pipefail
          IMAGE_REF="${{ steps.vars.outputs.image_ref }}"

          docker buildx build \
            --platform=linux/amd64 \
            --file="${DOCKERFILE}" \
            --tag="${IMAGE_REF}" \
            --push \
            .

          DIGEST=$(aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --image-ids "imageTag=${{ steps.vars.outputs.image_tag }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${IMAGE_REF}@${DIGEST}"
