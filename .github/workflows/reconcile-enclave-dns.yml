name: Reconcile enclave DNS

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  # This mutates the same canonical/regional DNS records as the enclave deploy
  # workflow. Keep it in the same queue so a scheduled reconcile cannot undo an
  # intentional deploy-time canonical drain while a regional MIG is rolling.
  group: deploy-enclave-gcp
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/44325983244/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: tr-deploy@quill-cloud-proxy.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Reconcile canonical and regional DNS
        env:
          QUILL_RECONCILE_APPLY: "1"
          QUILL_API_HOST: api.trustedrouter.com
          QUILL_DNS_ZONE: trustedrouter-com
          QUILL_PUBLISH_REGIONAL: "1"
          QUILL_REGIONAL_ZONE: quillrouter-com
          QUILL_REGIONAL_SUFFIX: quillrouter.com
        run: uv run --script tools/reconcile-enclave-dns.py --apply
